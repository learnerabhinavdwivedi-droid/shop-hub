<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Analysis | Shop Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            background-image: radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .back-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .product-info {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
        }

        .product-img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
            aspect-ratio: 1;
            object-fit: cover;
        }

        .graph-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            min-height: 400px;
        }

        h1 {
            margin: 0;
            font-weight: 800;
            font-size: 2.5rem;
        }

        .price-big {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .stat-label {
            color: #94a3b8;
        }

        .stat-value {
            font-weight: 600;
        }

        .buy-btn-big {
            display: block;
            width: 100%;
            text-align: center;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 16px;
            margin-top: 20px;
            font-weight: 700;
            font-size: 16px;
        }

        .buy-btn-big:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
            <h1>Deep Market Analysis</h1>
        </div>

        <div class="analysis-grid">
            <div class="product-info" id="product-details">
                <!-- Details injected here -->
            </div>
            <div class="graph-card">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('product');

        async function init() {
            if (!productName) return;

            try {
                const response = await fetch(`/api/analysis/${encodeURIComponent(productName)}`);
                const data = await response.json();

                renderDetails(data);
                renderChart(data);
            } catch (err) {
                console.error("Failed to load analysis");
            }
        }

        function renderDetails(data) {
            const container = document.getElementById('product-details');
            container.innerHTML = `
                <img src="${data.imageUrl || 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&q=80&w=300'}" class="product-img">
                <h2 style="margin-top:0">${data.productName}</h2>
                <div class="price-big">₹${data.currentPrice}</div>
                <div class="stat-row">
                    <span class="stat-label">Market Status</span>
                    <span class="stat-value" style="color: ${data.suggestion === 'Buy' ? '#10b981' : '#f59e0b'}">${data.suggestion}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Historical Average</span>
                    <span class="stat-value">₹${data.historicalAverage}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Price Points</span>
                    <span class="stat-value">${(data.priceHistory || []).length} records</span>
                </div>
                <a href="${data.url || '#'}" target="_blank" rel="noopener" class="buy-btn-big">🛒 Buy Now</a>
            `;
        }

        function renderChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            let labels, prices;
            if (data.priceHistory && data.priceHistory.length > 0) {
                labels = data.priceHistory.map(p => new Date(p.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }));
                prices = data.priceHistory.map(p => p.price);
            } else {
                labels = ['30 Days Ago', '20 Days Ago', '10 Days Ago', 'Current'];
                prices = [
                    data.historicalAverage * 1.05,
                    data.historicalAverage * 0.98,
                    data.historicalAverage * 1.1,
                    data.currentPrice
                ];
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Price Trend (₹)',
                        data: prices,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: '#a855f7',
                        pointRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        init();
    </script>
</body>

</html>
